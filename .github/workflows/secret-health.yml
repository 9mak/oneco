name: Secret Health Check

# 外部 API トークン (Groq / Threads) の失効を日次でチェックし、失効時に Discord 通知。
#
# 背景: 2026-06-27 に Groq key が GitHub secret 側で約6週間失効していたのに気づかず、
# SNS 投稿が全部 fallback テンプレ文に劣化していた (workflow は fallback で success
# 表示のため無音)。トークンのローテ忘れ・有効期限切れによる「静かな失効」を早期検知する。
#
# 設計判断:
# - 日次で十分: 失効は突発でなくローテ/期限イベント。30分監視 (uptime) ほどの密度は不要。
# - JST 9:00 (UTC 0:00) 実行: SNS publish と同時間帯なので、失効してれば毎朝気づける。
# - 401/403 のみ失効判定: 5xx/timeout は一時障害として通知しない (誤通知疲労回避)。
# - 失効時は exit 1 で CI も failure: Discord が万一届かなくても GitHub 側で気づける二重ガード。

on:
  schedule:
    - cron: '0 0 * * *'  # 毎日 UTC 0:00 = JST 9:00
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        # check_secret_health.py は NotificationClient を import するが、
        # infrastructure/__init__.py が eager に snapshot_store→domain.models→pydantic
        # を引き込むため、httpx/requests だけでは ModuleNotFoundError になる。
        # data-collector.yml と同じく editable install で全依存を解決する。
        run: pip install -e .

      - name: Check secret health
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python3 scripts/monitoring/check_secret_health.py
