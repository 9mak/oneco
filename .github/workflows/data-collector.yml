name: Data Collector

on:
  # 毎日深夜0時（UTC 15:00 = JST 00:00）に自動実行
  schedule:
    - cron: '0 15 * * *'

  # 手動実行をサポート
  workflow_dispatch:

permissions:
  contents: write
  # 自己修復ループ Phase 1→2 橋渡し: __main__ が検知サイトを
  # auto-fix-adapter.yml に workflow_dispatch する。GITHUB_TOKEN で
  # 他 workflow を起動するには actions: write が必要。
  actions: write

jobs:
  collect:
    runs-on: ubuntu-latest
    # GitHub Actions のデフォルト 6h は 200+ サイトを処理しきれずタイムアウトすることがあるため
    # 5h で打ち切り、artifact upload と commit&push の時間を確保する
    timeout-minutes: 300

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          playwright install chromium --with-deps

      # 本番 DB スキーマを最新に揃える。data-collector はデプロイ経路を介さず
      # 直接 production DB を触るため、ここで alembic を打たないと「コードは
      # 最新だが本番 DB に新カラムが無い」状態で全件 INSERT 失敗する
      # (PR #138 source_site 追加時に発生)。idempotent なので毎回実行で安全。
      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: alembic upgrade head

      - name: Run data collector
        env:
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # 1 サイトの処理が固まっても次のサイトへ進めるため、SIGALRM ベースの per-site timeout
          SITE_TIMEOUT_SEC: '120'
          SITE_TIMEOUT_JS_SEC: '180'
          # 自己修復ループ Phase 1→2: 検知サイトを auto-fix-adapter ワーカーに渡す。
          # kill switch 既定 false なので、明示的に true にしないと一切起動しない
          # (初期は dry_run=true で安全段階リリース。安定確認後に false へ)。
          # gh CLI が GitHub API を叩くために GH_TOKEN が必要。
          ONECO_AUTO_FIX_ENABLED: ${{ vars.ONECO_AUTO_FIX_ENABLED || 'false' }}
          ONECO_AUTO_FIX_DRY_RUN: ${{ vars.ONECO_AUTO_FIX_DRY_RUN || 'true' }}
          ONECO_AUTO_FIX_MAX_SITES: ${{ vars.ONECO_AUTO_FIX_MAX_SITES || '3' }}
          # PAT-ready: ONECO_AUTO_FIX_TOKEN (PAT or GitHub App token) があれば
          # それを優先、無ければ GITHUB_TOKEN に fallback。
          #   - GITHUB_TOKEN: workflow_dispatch (Hop 1) は動くが、auto-fix が作る
          #     PR (Hop 2) は downstream pull_request workflow を発火しない
          #     (GitHub の recursion prevention 仕様)
          #   - PAT/App token: Hop 2 も発火する (auto-merge-fix-pr.yml が動く)
          # 詳細: project_self_healing memory, PR #216 description
          GH_TOKEN: ${{ secrets.ONECO_AUTO_FIX_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          python -m data_collector

      - name: Upload output artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: collection-results
          path: |
            output/animals.json
            snapshots/latest.json
          retention-days: 30

      - name: Commit and push changes (if any)
        if: success()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # 監視状態ファイル (broken_sites / site_baselines / field_quality_drift) は
          # run 跨ぎで状態を保持するため必ず commit する。存在しないファイルを
          # git add に渡すと pathspec エラーで stage 全体が中断するため、存在する
          # ものだけを個別に add する。
          for f in output/animals.json snapshots/latest.json \
                   data/broken_sites.yaml data/site_baselines.yaml \
                   data/field_quality_drift.yaml; do
            [ -e "$f" ] && git add "$f" || true
          done

          # 変更が無ければ何もしない (exit 0)
          if git diff --staged --quiet; then
            echo "::notice::No changes to commit"
            exit 0
          fi

          git commit -m "Update collection data [automated]

          🤖 Generated with Claude Code (https://claude.com/claude-code)

          Co-Authored-By: Claude Sonnet 4.5 <noreply@anthropic.com>"

          # push retry: 手動 trigger と定期 trigger が衝突して reject される
          # ケース (run #25977312469 で実際に発生) があるため、最大 3 回まで
          # `git pull --rebase` してから push をやり直す。
          push_attempts=3
          for attempt in $(seq 1 $push_attempts); do
            if git push; then
              echo "::notice::Push successful on attempt $attempt"
              exit 0
            fi
            echo "::warning::Push attempt $attempt failed (likely upstream changed)"
            if [ "$attempt" -lt "$push_attempts" ]; then
              echo "Pulling latest main with rebase and retrying..."
              if ! git pull --rebase origin main; then
                echo "::error::git pull --rebase failed at attempt $attempt; aborting retry"
                exit 0
              fi
              sleep $((attempt * 3))
            fi
          done
          echo "::error::Push failed after $push_attempts attempts; data commit will be retried in the next run"
          # exit 0 で workflow 自体は成功扱い (best-effort)。次回 run で再試行される。
          exit 0

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          # SLACK_WEBHOOK_URL secret 未設定時は何もしない（graceful degradation）
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "::notice::SLACK_WEBHOOK_URL secret not configured; skipping Slack notification"
            exit 0
          fi
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PAYLOAD=$(jq -n \
            --arg text ":warning: oneco data-collector が失敗しました" \
            --arg run_url "$RUN_URL" \
            --arg run_no "${{ github.run_number }}" \
            --arg event "${{ github.event_name }}" \
            '{text: ($text + "\n<" + $run_url + "|run #" + $run_no + "> (" + $event + ")")}')
          curl -sS -X POST -H 'Content-Type: application/json' \
            --data "$PAYLOAD" "$SLACK_WEBHOOK_URL" || echo "::warning::Slack webhook 送信に失敗"

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          # DISCORD_WEBHOOK_URL secret 未設定時は何もしない（graceful degradation）
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "::notice::DISCORD_WEBHOOK_URL secret not configured; skipping Discord notification"
            exit 0
          fi
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          CONTENT=":warning: oneco data-collector が失敗しました
          run #${{ github.run_number }} (${{ github.event_name }})
          $RUN_URL"
          PAYLOAD=$(jq -n --arg content "$CONTENT" '{content: $content}')
          curl -sS -X POST -H 'Content-Type: application/json' \
            --data "$PAYLOAD" "$DISCORD_WEBHOOK_URL" || echo "::warning::Discord webhook 送信に失敗"
