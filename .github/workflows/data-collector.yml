name: Data Collector

on:
  # 毎日深夜0時（UTC 15:00 = JST 00:00）に自動実行
  schedule:
    - cron: '0 15 * * *'

  # 手動実行をサポート
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    # GitHub Actions のデフォルト 6h は 200+ サイトを処理しきれずタイムアウトすることがあるため
    # 5h で打ち切り、artifact upload と commit&push の時間を確保する
    timeout-minutes: 300

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          playwright install chromium --with-deps

      - name: Run data collector
        env:
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # 1 サイトの処理が固まっても次のサイトへ進めるため、SIGALRM ベースの per-site timeout
          SITE_TIMEOUT_SEC: '120'
          SITE_TIMEOUT_JS_SEC: '180'
        run: |
          python -m data_collector

      - name: Upload output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: collection-results
          path: |
            output/animals.json
            snapshots/latest.json
          retention-days: 30

      - name: Commit and push changes (if any)
        if: success()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add output/animals.json snapshots/latest.json || true
          git diff --staged --quiet || git commit -m "Update collection data [automated]

          🤖 Generated with Claude Code (https://claude.com/claude-code)

          Co-Authored-By: Claude Sonnet 4.5 <noreply@anthropic.com>"
          git push || true
