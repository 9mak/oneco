version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: oneco-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: oneco-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oneco}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oneco_dev}
      POSTGRES_DB: ${POSTGRES_DB:-oneco}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oneco}"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

volumes:
  redis-data:
  postgres-data:
