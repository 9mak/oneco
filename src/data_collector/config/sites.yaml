# LLM抽出エンジン サイト設定
#
# 凡例:
#   requires_js: true  → Playwright（JS実行）で取得
#   single_page: true  → 一覧ページに動物情報が直接記載（個別詳細ページなし）
#   list_link_pattern  → 詳細リンクのCSSセレクター（静的HTML向け）

extraction:
  default_provider: groq
  default_model: llama-3.3-70b-versatile

sites:
  # ===================================================================
  # 徳島県
  # ===================================================================
  # 【対応状況】Playwright対応済み。現在収容0件のため取得件数は0になる場合あり。
  # /stray/ = センターに収容されている動物（jQuery .load() で動的読み込み）
  - name: "徳島県動物愛護管理センター（収容中）"
    prefecture: "徳島県"
    prefecture_code: "36"
    list_url: "https://douai-tokushima.com/stray/"
    category: "lost"
    requires_js: true

  # 【徳島県動物愛護管理センター 譲渡予定】douai-tokushima.com の譲渡犬・譲渡猫ページ
  # 動的ページのため requires_js: true
  - name: "徳島県動物愛護管理センター（譲渡犬）"
    prefecture: "徳島県"
    prefecture_code: "36"
    list_url: "https://douai-tokushima.com/transfer/doglist"
    category: "adoption"
    requires_js: true

  - name: "徳島県動物愛護管理センター（譲渡猫）"
    prefecture: "徳島県"
    prefecture_code: "36"
    list_url: "https://douai-tokushima.com/transfer/catlist"
    category: "adoption"
    requires_js: true

  # ===================================================================
  # 香川県
  # ===================================================================
  # 【高松市】静的HTML。収容動物はテーブルに行追加される形式。
  # 現在収容0件の場合は0件取得（正常動作）。
  # 個別詳細ページのURL形式: ani_infodetail1.html?infoid=xxx
  - name: "高松市 わんにゃん高松（収容中犬）"
    prefecture: "香川県"
    prefecture_code: "37"
    list_url: "https://www.city.takamatsu.kagawa.jp/udanimo/ani_infolist1.html?infotype=1&animaltype=1"
    list_link_pattern: "a[href*='ani_infodetail']"
    category: "lost"

  - name: "高松市 わんにゃん高松（収容中猫）"
    prefecture: "香川県"
    prefecture_code: "37"
    list_url: "https://www.city.takamatsu.kagawa.jp/udanimo/ani_infolist1.html?infotype=1&animaltype=2"
    list_link_pattern: "a[href*='ani_infodetail']"
    category: "lost"

  # 【さぬき動物愛護センター】PDF形式。Playwrightでページを取得しPDFリンクを抽出。
  # PDFはPdfFetcherでダウンロード＆テキスト抽出してLLMに渡す。
  # PDFは複数頭の一覧表形式のため pdf_multi_animal: true で全頭を個別抽出する。
  # 確認済みPDF URL例: /documents/6103/0318dog.pdf, /documents/6103/0321cat.pdf
  - name: "さぬき動物愛護センター（譲渡犬猫）"
    prefecture: "香川県"
    prefecture_code: "37"
    list_url: "https://www.pref.kagawa.lg.jp/s-doubutuaigo/sanukidouaicenter/jyouto/s04u6e190311095146.html"
    category: "adoption"
    requires_js: true
    pdf_link_pattern: "a[href*='/documents/6103/'][href$='.pdf']"
    pdf_multi_animal: true

  # 【東讃保健福祉事務所】収容動物情報PDF（静的HTML）
  # ページID 7023。PDF URL例: /documents/7023/20260316.pdf
