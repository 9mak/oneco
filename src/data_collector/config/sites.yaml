# LLM抽出エンジン サイト設定
#
# 凡例:
#   requires_js: true  → Playwright（JS実行）で取得
#   single_page: true  → 一覧ページに動物情報が直接記載（個別詳細ページなし）
#   list_link_pattern  → 詳細リンクのCSSセレクター（静的HTML向け）

extraction:
  default_provider: google
  default_model: gemini-2.5-flash

sites:
  # ===================================================================
  # 徳島県
  # ===================================================================
  # 【対応状況】Playwright対応済み。現在収容0件のため取得件数は0になる場合あり。
  # /stray/ = センターに収容されている動物（jQuery .load() で動的読み込み）
  - name: "徳島県動物愛護管理センター（収容中）"
    prefecture: "徳島県"
    prefecture_code: "36"
    list_url: "https://douai-tokushima.com/stray/"
    category: "lost"
    requires_js: true

  # 【徳島県動物愛護管理センター 譲渡予定】douai-tokushima.com の譲渡犬・譲渡猫ページ
  # 動的ページのため requires_js: true
  - name: "徳島県動物愛護管理センター（譲渡犬）"
    prefecture: "徳島県"
    prefecture_code: "36"
    list_url: "https://douai-tokushima.com/transfer/doglist"
    category: "adoption"
    requires_js: true

  - name: "徳島県動物愛護管理センター（譲渡猫）"
    prefecture: "徳島県"
    prefecture_code: "36"
    list_url: "https://douai-tokushima.com/transfer/catlist"
    category: "adoption"
    requires_js: true

  # ===================================================================
  # 香川県
  # ===================================================================
  # 【高松市】静的HTML。収容動物はテーブルに行追加される形式。
  # 現在収容0件の場合は0件取得（正常動作）。
  # 個別詳細ページのURL形式: ani_infodetail1.html?infoid=xxx
  - name: "高松市 わんにゃん高松（収容中犬）"
    prefecture: "香川県"
    prefecture_code: "37"
    list_url: "https://www.city.takamatsu.kagawa.jp/udanimo/ani_infolist1.html?infotype=1&animaltype=1"
    list_link_pattern: "a[href*='ani_infodetail']"
    category: "lost"

  - name: "高松市 わんにゃん高松（収容中猫）"
    prefecture: "香川県"
    prefecture_code: "37"
    list_url: "https://www.city.takamatsu.kagawa.jp/udanimo/ani_infolist1.html?infotype=1&animaltype=2"
    list_link_pattern: "a[href*='ani_infodetail']"
    category: "lost"

  # 【さぬき動物愛護センター】PDF形式。Playwrightでページを取得しPDFリンクを抽出。
  # PDFはPdfFetcherでダウンロード＆テキスト抽出してLLMに渡す。
  # 確認済みPDF URL例: /documents/6103/0318dog.pdf, /documents/6103/0321cat.pdf
  - name: "さぬき動物愛護センター（譲渡犬猫）"
    prefecture: "香川県"
    prefecture_code: "37"
    list_url: "https://www.pref.kagawa.lg.jp/s-doubutuaigo/sanukidouaicenter/jyouto/s04u6e190311095146.html"
    category: "adoption"
    requires_js: true
    pdf_link_pattern: "a[href$='.pdf']"

  # 【東讃保健福祉事務所】収容動物情報PDF（静的HTML）
  # ページID 7023。PDF URL例: /documents/7023/20260316.pdf
  - name: "東讃保健福祉事務所（収容動物）"
    prefecture: "香川県"
    prefecture_code: "37"
    list_url: "https://www.pref.kagawa.lg.jp/tosanhoken/tosanhoken/animal/sjiaen191105113550.html"
    category: "lost"
    pdf_link_pattern: "a[href*='/documents/7023/'][href$='.pdf']"

  # 【中讃保健福祉事務所】収容動物情報PDF（静的HTML）
  - name: "中讃保健福祉事務所（収容動物）"
    prefecture: "香川県"
    prefecture_code: "37"
    list_url: "https://www.pref.kagawa.lg.jp/chusanhoken/chusanhoken/inu-neko/s058kw191105221746.html"
    category: "lost"
    pdf_link_pattern: "a[href$='.pdf']"

  # 【西讃保健福祉事務所】収容動物情報PDF（静的HTML）
  - name: "西讃保健福祉事務所（収容動物）"
    prefecture: "香川県"
    prefecture_code: "37"
    list_url: "https://www.pref.kagawa.lg.jp/seisanhoken/seisanhoken/doubutuaigo/sqvuo1191030100247.html"
    category: "lost"
    pdf_link_pattern: "a[href$='.pdf']"

  # 【小豆総合事務所保健部】収容動物情報PDF（静的HTML）
  - name: "小豆保健所（収容動物）"
    prefecture: "香川県"
    prefecture_code: "37"
    list_url: "https://www.pref.kagawa.lg.jp/shozu/hoken/syuuyou_info.html"
    category: "lost"
    pdf_link_pattern: "a[href$='.pdf']"

  # ===================================================================
  # 愛媛県
  # ===================================================================
  # 【収容中動物】迷い犬猫情報（センター収容中で飼い主返還または譲渡待ち）
  # 静的HTML。テーブルに複数動物が記載（個別詳細ページなし）
  - name: "愛媛県動物愛護センター（収容中）"
    prefecture: "愛媛県"
    prefecture_code: "38"
    list_url: "https://www.pref.ehime.jp/page/16976.html"
    category: "lost"
    single_page: true

  # 【譲渡予定動物】健康管理済みで譲渡候補になった動物
  # 静的HTML。テーブルに複数動物が記載（個別詳細ページなし）
  - name: "愛媛県動物愛護センター（譲渡予定）"
    prefecture: "愛媛県"
    prefecture_code: "38"
    list_url: "https://www.pref.ehime.jp/page/17125.html"
    category: "adoption"
    single_page: true

  # 【松山市 はぴまるの丘】静的HTML。犬・猫の収容情報がHTMLに直接埋め込まれている。
  # 正しいURL: /kurashi/kurashi/aigo/index.html（個別ページなし single_page形式）
  - name: "松山市 はぴまるの丘（収容中）"
    prefecture: "愛媛県"
    prefecture_code: "38"
    list_url: "https://www.city.matsuyama.ehime.jp/kurashi/kurashi/aigo/index.html"
    category: "lost"
    single_page: true
