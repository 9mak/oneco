# Ruff Configuration
# https://docs.astral.sh/ruff/

# Exclude patterns
exclude = [
    ".git",
    ".github",
    ".pytest_cache",
    ".ruff_cache",
    "__pycache__",
    "venv",
    "env",
    "build",
    "dist",
    "*.egg-info",
    "alembic/versions/*.py",  # Auto-generated migrations
    "frontend/node_modules",
]

# Python version
target-version = "py311"

# Line length
line-length = 100

[lint]
# Enable rules
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "DTZ", # flake8-datetimez
    "T10", # flake8-debugger
    "PL",  # pylint
    "RUF", # ruff-specific rules
]

# Disable specific rules
ignore = [
    "E501",    # line-too-long (handled by formatter)
    "PLR0913", # too-many-arguments
    "PLR2004", # magic-value-comparison
    "PLR0912", # too-many-branches
    "PLR0915", # too-many-statements
    "N805",    # first-argument-should-be-named-self (for Pydantic validators)
    "RUF001",  # ambiguous-unicode-character-string (日本語プロジェクト)
    "RUF002",  # ambiguous-unicode-character-docstring (日本語プロジェクト)
    "RUF003",  # ambiguous-unicode-character-comment (日本語プロジェクト)
    "PLC0415", # import-outside-toplevel (既存コードで多用)
    "B008",    # function-call-in-default-argument (FastAPI Depends/Query で当然)
    "B904",    # raise-without-from-inside-except (既存コード負債、別途対応)
    "RUF012",  # mutable-class-attributes (既存コード負債、別途対応)
    "DTZ001",  # call-datetime-without-tzinfo (既存コード負債、別途対応)
    "DTZ003",  # call-datetime-utcnow (既存コード負債、別途対応)
    "DTZ005",  # call-datetime-now-without-tzinfo (既存コード負債、別途対応)
    "DTZ007",  # call-datetime-strptime-without-zone (既存コード負債、別途対応)
    "DTZ011",  # call-date-today (既存コード負債、別途対応)
    "PLR0911", # too-many-return-statements (既存コード負債)
]

# Allow autofix for all enabled rules
fixable = ["ALL"]
unfixable = []

# Allow unused variables when prefixed with underscore
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[lint.per-file-ignores]
# Ignore import errors in __init__.py files
"__init__.py" = ["F401", "F403"]
# Ignore assert statements in tests
"tests/**/*.py" = ["S101", "PLR2004", "B017", "RUF043"]
# FastAPI lifespan で global 変数管理は許容
"src/data_collector/infrastructure/api/app.py" = ["PLW0603"]
# 外部API スキーマのフィールド名はキャメルケースが仕様
"src/notification_manager/infrastructure/api/schemas.py" = ["N815"]
# datetime as Date は既存コード (外部API命名に合わせている)
"src/syndication_service/api/routes.py" = ["N812"]
# for ループ変数のシャドウは既存コード
"src/notification_manager/domain/conversation.py" = ["PLW2901"]
# 前方参照 (TYPE_CHECKING 未使用) は既存コード負債
"src/data_collector/services/*.py" = ["F821"]
"src/data_collector/adapters/kochi_adapter.py" = ["F821"]
# try ブロック内の条件付き import は既存コード
"src/notification_manager/adapters/line_adapter.py" = ["F401"]

[lint.isort]
# Import sorting configuration
known-first-party = ["data_collector", "notification_manager", "syndication_service"]
section-order = ["future", "standard-library", "third-party", "first-party", "local-folder"]

[lint.pydocstyle]
# Docstring convention
convention = "google"

[format]
# Format configuration
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
